name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Build & Release haiku-act-runner
    runs-on:
      - haiku

    env:
      PATH: /boot/system/develop/tools/bin:/bin:/boot/system/non-packaged/bin:/boot/home/config/non-packaged/bin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pkgman install -y \
            curl_devel \
            yaml_cpp0.8_devel \
            protobuf_devel \
            libmicrohttpd_devel \
            openssl3_devel \
            cmake

      - name: Get version
        id: version
        run: |
          VERSION=$(grep 'set(RUNNER_VERSION' CMakeLists.txt | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "ARCHIVE=haiku-act-runner-${VERSION}-x86_64" >> $GITHUB_ENV
          echo "Version: ${VERSION}"

      - name: Build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_CXX_EXTENSIONS=OFF \
            -DRUNNER_VERSION="${VERSION}"
          cmake --build build -- -j$(nproc)

      - name: Run tests
        run: ctest --test-dir build --output-on-failure -j1

      - name: Verify binary
        run: |
          test -f build/act_runner && echo "Binary OK"
          build/act_runner version

      - name: Package
        run: |
          mkdir -p dist/${ARCHIVE}
          cp build/act_runner         dist/${ARCHIVE}/
          cp config.yaml.example      dist/${ARCHIVE}/
          cp README.md                dist/${ARCHIVE}/
          # Create tarball
          cd dist
          tar -czf ${ARCHIVE}.tar.gz ${ARCHIVE}/
          echo "Package: $(ls -lh ${ARCHIVE}.tar.gz)"

      - name: SHA-256 checksums
        run: |
          cd dist
          sha256sum ${ARCHIVE}.tar.gz > ${ARCHIVE}.tar.gz.sha256
          sha256sum ../../build/act_runner > act_runner.sha256
          echo "Checksums:"
          cat ${ARCHIVE}.tar.gz.sha256
          cat act_runner.sha256

      - name: Create Gitea release
        run: |
          curl -s -X POST "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"v${VERSION}\",
              \"name\": \"v${VERSION}\",
              \"body\": \"## haiku-act-runner v${VERSION}\n\nNative Gitea Actions runner for Haiku OS (x86_64).\n\n### Installation\n\`\`\`\ncurl -O \$RELEASE_URL/${ARCHIVE}.tar.gz\nsha256sum -c ${ARCHIVE}.tar.gz.sha256\ntar -xzf ${ARCHIVE}.tar.gz\n\`\`\`\n\n### Checksums\nSee attached \`.sha256\` files.\",
              \"draft\": false,
              \"prerelease\": false
            }" -o /tmp/release.json
          RELEASE_ID=$(cat /tmp/release.json | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          echo "RELEASE_ID=${RELEASE_ID}" >> $GITHUB_ENV
          echo "Release ID: ${RELEASE_ID}"

      - name: Upload tarball
        run: |
          curl -s -X POST \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${ARCHIVE}.tar.gz" \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@dist/${ARCHIVE}.tar.gz"
          echo "Uploaded ${ARCHIVE}.tar.gz"

      - name: Upload tarball checksum
        run: |
          curl -s -X POST \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=${ARCHIVE}.tar.gz.sha256" \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: text/plain" \
            --data-binary "@dist/${ARCHIVE}.tar.gz.sha256"
          echo "Uploaded ${ARCHIVE}.tar.gz.sha256"

      - name: Upload bare binary
        run: |
          curl -s -X POST \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=act_runner" \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@build/act_runner"
          echo "Uploaded act_runner binary"

      - name: Upload binary checksum
        run: |
          curl -s -X POST \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?name=act_runner.sha256" \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: text/plain" \
            --data-binary "@dist/act_runner.sha256"
          echo "Uploaded act_runner.sha256"
